name: 코스피 캔들 데이터 자동 갱신

on:
  workflow_dispatch:
  schedule:
    # UTC 07:00 = 한국시간 오후 4시 (장 마감 후 종가 기준)
    - cron: "0 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: kospi-candle-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 필요한 도구 설치
        run: pip install -r requirements.txt
      - name: 코스피 종가 데이터 가져오기
        env:
          TZ: Asia/Seoul
        run: python update.py
      - name: 새 데이터 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
          else
            git commit -m "코스피 캔들 데이터 자동 갱신"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
