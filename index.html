<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>코스피·코스닥 캔들 차트</title>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#fff;color:#0f172a;font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{padding:20px 28px 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:42px}
    .card{min-width:0}.title{font-weight:800;font-size:20px;margin-bottom:5px}.title:before{content:"▥";color:#2563eb;margin-right:10px}
    .value-line{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}.value{font-family:Georgia,serif;font-size:31px}.change{font-weight:800;font-size:14px}
    .up{color:#ff334f}.down{color:#2467dd}.sub{margin:12px 0 10px;color:#64748b;font-size:12px}
    .buttons{display:flex;gap:7px;margin-bottom:8px}.buttons button{border:0;border-radius:8px;background:#edf1f6;color:#475569;font-weight:800;padding:8px 12px;cursor:pointer}
    .buttons button.active{background:#1769ff;color:white}.chart{height:300px}.foot{border-top:1px solid #e2e8f0;margin-top:12px;padding-top:9px;color:#64748b;font-size:11px;line-height:1.8}
    .status{text-align:right;color:#64748b;font-size:11px;margin-top:8px}.error{padding:18px;background:#fff1f2;color:#be123c;border-radius:10px}
    @media(max-width:900px){.grid{grid-template-columns:1fr;gap:32px}.wrap{padding:16px}.chart{height:330px}}
  </style>
</head>
<body>
<div class="wrap">
  <div id="error"></div>
  <div class="grid">
    <section class="card" id="card-kospi">
      <div class="title">코스피 캔들 차트</div>
      <div class="value-line"><span class="value"></span><span class="change"></span></div>
      <div class="sub">코스피 · KOSPI · 일봉</div>
      <div class="buttons"></div><div class="chart"></div><div class="foot"></div>
    </section>
    <section class="card" id="card-kosdaq">
      <div class="title">코스닥 캔들 차트</div>
      <div class="value-line"><span class="value"></span><span class="change"></span></div>
      <div class="sub">코스닥 · KOSDAQ · 일봉</div>
      <div class="buttons"></div><div class="chart"></div><div class="foot"></div>
    </section>
  </div>
  <div class="status" id="status"></div>
</div>
<script>
const ranges={ "1M":23, "3M":66, "6M":132, "YTD":"YTD", "1Y":260, "MAX":"MAX" };
const fmt=n=>Number(n).toLocaleString("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});

function sliceRange(rows, key){
  if(key==="MAX") return rows;
  if(key==="YTD"){
    const y=new Date().getFullYear().toString();
    return rows.filter(x=>x.time.startsWith(y));
  }
  return rows.slice(-ranges[key]);
}

function renderCard(key, market, updatedAt){
  const root=document.getElementById("card-"+key);
  const value=root.querySelector(".value"), change=root.querySelector(".change");
  value.textContent=fmt(market.latest);
  const up=market.change>=0;
  change.className="change "+(up?"up":"down");
  change.textContent=`${up?"▲":"▼"} ${up?"+":""}${fmt(market.change)} (${up?"+":""}${market.changePct.toFixed(2)}%)`;
  root.querySelector(".foot").innerHTML=`기준: ${market.marketDate} · 갱신: ${updatedAt}<br>출처: Yahoo Finance 지연 시세 · 실시간 데이터가 아닐 수 있습니다.`;

  const chartEl=root.querySelector(".chart");
  const chart=LightweightCharts.createChart(chartEl,{
    width:chartEl.clientWidth,height:chartEl.clientHeight,
    layout:{background:{color:"#fff"},textColor:"#64748b"},
    grid:{vertLines:{color:"#e9eef5"},horzLines:{color:"#e9eef5"}},
    rightPriceScale:{borderColor:"#dbe3ed"},timeScale:{borderColor:"#dbe3ed",timeVisible:false},
    localization:{locale:"ko-KR"}
  });
  const candle=chart.addCandlestickSeries({upColor:"#ff4057",downColor:"#2868dc",borderVisible:false,wickUpColor:"#ff4057",wickDownColor:"#2868dc"});
  const volume=chart.addHistogramSeries({priceFormat:{type:"volume"},priceScaleId:"",scaleMargins:{top:0.82,bottom:0}});
  function setRange(r){
    const rows=sliceRange(market.candles,r);
    candle.setData(rows.map(x=>({time:x.time,open:x.open,high:x.high,low:x.low,close:x.close})));
    volume.setData(rows.map(x=>({time:x.time,value:x.volume,color:x.close>=x.open?"rgba(255,64,87,.35)":"rgba(40,104,220,.35)"})));
    chart.timeScale().fitContent();
  }
  const buttons=root.querySelector(".buttons");
  Object.keys(ranges).forEach(r=>{
    const b=document.createElement("button"); b.textContent=r;
    b.onclick=()=>{buttons.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active");setRange(r)};
    buttons.appendChild(b);
    if(r==="3M"){b.classList.add("active");setRange(r)}
  });
  new ResizeObserver(()=>chart.applyOptions({width:chartEl.clientWidth,height:chartEl.clientHeight})).observe(chartEl);
}

async function load(){
  try{
    const res=await fetch(`data.json?v=${Date.now()}`,{cache:"no-store"});
    if(!res.ok) throw new Error(`data.json HTTP ${res.status}`);
    const data=await res.json();
    if(data.markets.kospi) renderCard("kospi",data.markets.kospi,data.updatedAt);
    if(data.markets.kosdaq) renderCard("kosdaq",data.markets.kosdaq,data.updatedAt);
    document.getElementById("status").textContent=`마지막 자동 갱신 ${data.updatedAt}`;
    if(data.errors) document.getElementById("error").innerHTML=`<div class="error">일부 데이터 갱신 실패: ${JSON.stringify(data.errors)}</div>`;
  }catch(e){
    document.getElementById("error").innerHTML=`<div class="error">차트 데이터를 불러오지 못했습니다: ${e.message}</div>`;
  }
}
load();
setInterval(load, 10*60*1000);
</script>
</body>
</html>
