<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>코스피 캔들 차트</title>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    :root{--text:#172033;--muted:#6c7484;--line:#e6e9ef;--button:#eef1f5;--active:#1565f5;--up:#ef3340;--down:#2f6edb}
    *{box-sizing:border-box}html,body{margin:0;width:100%;background:#fff;color:var(--text);font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{width:100%;padding:14px 16px 9px}.title{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:19px;font-weight:750}.icon{color:var(--active);font-size:20px}
    .summary{display:flex;align-items:baseline;flex-wrap:wrap;gap:9px;min-height:41px}.price{font-size:clamp(26px,4.5vw,37px);line-height:1;font-variant-numeric:tabular-nums}.change{font-size:15px;font-weight:650}.up{color:var(--up)}.down{color:var(--down)}
    .market{margin-top:5px;color:var(--muted);font-size:11px}.toolbar{display:flex;align-items:center;gap:5px;margin:10px 0 7px;overflow-x:auto}.toolbar button{min-width:39px;height:28px;padding:0 10px;border:0;border-radius:7px;background:var(--button);color:#566074;cursor:pointer;font-size:11px;font-weight:700}.toolbar button.active{background:var(--active);color:#fff}
    #chart{width:100%;height:330px;border-bottom:1px solid var(--line)}.footer{display:flex;justify-content:space-between;gap:16px;padding-top:7px;color:var(--muted);font-size:10px;line-height:1.45}.footer a{color:inherit;text-decoration:none}.error{display:none;margin-top:12px;padding:13px;border:1px solid #e5a2a7;border-radius:9px;background:#fff5f5;color:#a12732;font-size:12px;line-height:1.6}
    @media(max-width:720px){.wrap{padding:11px 10px 8px}.title{font-size:17px}#chart{height:315px}.footer{flex-direction:column;gap:2px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="title"><span class="icon">▥</span><span>코스피 캔들 차트</span></div>
    <div class="summary"><span class="price" id="price">—</span><span class="change" id="change">데이터를 불러오는 중…</span></div>
    <div class="market">코스피 · KOSPI · 일봉</div>
    <div class="toolbar" id="toolbar">
      <button data-range="1M">1M</button><button class="active" data-range="3M">3M</button><button data-range="6M">6M</button><button data-range="YTD">YTD</button><button data-range="1Y">1Y</button><button data-range="MAX">MAX</button>
    </div>
    <div id="chart"></div><div class="error" id="error"></div>
    <div class="footer"><div>기준: <strong id="marketDate">—</strong> · 갱신: <span id="updatedAt">—</span></div><div><a href="https://finance.yahoo.com/quote/%5EKS11/history/" target="_blank" rel="noopener noreferrer">출처: Yahoo Finance</a> · 장 마감 후 종가 기준</div></div>
  </main>
  <script>
    const fmt=new Intl.NumberFormat("ko-KR",{minimumFractionDigits:2,maximumFractionDigits:2});
    let rows=[],chart,candles,volume;
    const parse=s=>{const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
    function filtered(range){if(!rows.length||range==="MAX")return rows;const last=parse(rows.at(-1).time);let start;if(range==="YTD")start=new Date(last.getFullYear(),0,1);else{const months={"1M":1,"3M":3,"6M":6,"1Y":12}[range];start=new Date(last);start.setMonth(start.getMonth()-months)}return rows.filter(r=>parse(r.time)>=start)}
    function draw(range){document.querySelectorAll("[data-range]").forEach(b=>b.classList.toggle("active",b.dataset.range===range));const data=filtered(range);candles.setData(data.map(r=>({time:r.time,open:r.open,high:r.high,low:r.low,close:r.close})));volume.setData(data.map(r=>({time:r.time,value:r.volume||0,color:r.close>=r.open?"rgba(239,51,64,.36)":"rgba(47,110,219,.36)"})));chart.timeScale().fitContent()}
    function createChart(){const el=document.getElementById("chart");chart=LightweightCharts.createChart(el,{width:el.clientWidth,height:el.clientHeight,layout:{background:{color:"#fff"},textColor:"#667085"},grid:{vertLines:{color:"#f0f2f6"},horzLines:{color:"#f0f2f6"}},rightPriceScale:{borderColor:"#e6e9ef",scaleMargins:{top:.08,bottom:.25}},timeScale:{borderColor:"#e6e9ef",rightOffset:2,barSpacing:9,minBarSpacing:3},localization:{locale:"ko-KR",priceFormatter:p=>fmt.format(p)}});candles=chart.addCandlestickSeries({upColor:"#ef3340",downColor:"#2f6edb",borderUpColor:"#ef3340",borderDownColor:"#2f6edb",wickUpColor:"#ef3340",wickDownColor:"#2f6edb"});volume=chart.addHistogramSeries({priceFormat:{type:"volume"},priceScaleId:"",lastValueVisible:false,priceLineVisible:false});volume.priceScale().applyOptions({scaleMargins:{top:.82,bottom:0}});new ResizeObserver(e=>chart.applyOptions({width:e[0].contentRect.width,height:e[0].contentRect.height})).observe(el)}
    function fail(message){document.getElementById("chart").style.display="none";document.getElementById("toolbar").style.display="none";const el=document.getElementById("error");el.style.display="block";el.textContent="차트 데이터를 표시하지 못했습니다: "+message}
    async function load(){try{const res=await fetch(`data.json?t=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(`data.json HTTP ${res.status}`);const data=await res.json();if(!data.market||!Array.isArray(data.market.candles)||data.market.candles.length<2)throw new Error("코스피 데이터 구조가 올바르지 않습니다.");const m=data.market;rows=m.candles;document.getElementById("price").textContent=fmt.format(m.latest);const up=m.change>=0;const change=document.getElementById("change");change.className="change "+(up?"up":"down");change.textContent=`${up?"▲":"▼"} ${up?"+":""}${fmt.format(m.change)} (${up?"+":""}${Number(m.changePct).toFixed(2)}%)`;document.getElementById("marketDate").textContent=m.marketDate;document.getElementById("updatedAt").textContent=data.updatedAt;createChart();draw("3M");document.querySelectorAll("[data-range]").forEach(b=>b.addEventListener("click",()=>draw(b.dataset.range)))}catch(e){fail(e.message)}}
    load();
  </script>
</body>
</html>
