<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>코스피 캔들 차트</title>

  <script
    src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"
  ></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #172033;
      --muted: #6c7484;
      --line: #e6e9ef;
      --button: #eef1f5;
      --button-text: #566074;
      --active: #1565f5;
      --up: #ef3340;
      --down: #2f6edb;
      --flat: #687386;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        Pretendard,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .wrap {
      width: 100%;
      padding: 14px 16px 9px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 19px;
      font-weight: 750;
    }

    .title-icon {
      color: var(--active);
      font-size: 20px;
      line-height: 1;
    }

    .summary {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      column-gap: 9px;
      row-gap: 2px;
      min-height: 41px;
    }

    .price {
      font-size: clamp(26px, 4.5vw, 37px);
      line-height: 1;
      letter-spacing: -0.7px;
      font-variant-numeric: tabular-nums;
    }

    .change {
      font-size: 15px;
      font-weight: 650;
      font-variant-numeric: tabular-nums;
    }

    .change.up {
      color: var(--up);
    }

    .change.down {
      color: var(--down);
    }

    .change.flat {
      color: var(--flat);
    }

    .market-name {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 10px 0 7px;
    }

    .range-button {
      min-width: 39px;
      height: 28px;
      padding: 0 10px;
      border: 0;
      border-radius: 7px;
      background: var(--button);
      color: var(--button-text);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    .range-button.active {
      background: var(--active);
      color: white;
    }

    .range-button:hover {
      filter: brightness(0.97);
    }

    .ohlc {
      min-width: 0;
      margin-left: auto;
      overflow: hidden;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #chart {
      width: 100%;
      height: 330px;
      border-bottom: 1px solid var(--line);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-top: 7px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.45;
    }

    .footer a {
      color: inherit;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .error {
      display: none;
      margin-top: 12px;
      padding: 13px;
      border: 1px solid #e5a2a7;
      border-radius: 9px;
      background: #fff5f5;
      color: #a12732;
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 11px 10px 8px;
      }

      .title {
        font-size: 17px;
      }

      .toolbar {
        overflow-x: auto;
        padding-bottom: 1px;
      }

      .ohlc {
        display: none;
      }

      #chart {
        height: 315px;
      }

      .footer {
        flex-direction: column;
        gap: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="title">
      <span class="title-icon">▥</span>
      <span>코스피 캔들 차트</span>
    </div>

    <div class="summary">
      <span class="price" id="price">—</span>
      <span class="change flat" id="change">데이터를 불러오는 중…</span>
    </div>

    <div class="market-name">코스피 · KOSPI · 일봉</div>

    <div class="toolbar">
      <button class="range-button" data-range="1M">1M</button>
      <button class="range-button active" data-range="3M">3M</button>
      <button class="range-button" data-range="6M">6M</button>
      <button class="range-button" data-range="YTD">YTD</button>
      <button class="range-button" data-range="1Y">1Y</button>
      <button class="range-button" data-range="MAX">MAX</button>

      <div class="ohlc" id="ohlc">
        캔들 위에 마우스를 올리면 시가·고가·저가·종가가 표시됩니다.
      </div>
    </div>

    <div id="chart"></div>
    <div class="error" id="error"></div>

    <div class="footer">
      <div>
        기준: <strong id="marketDate">—</strong>
        · 갱신: <span id="updatedAt">—</span>
      </div>

      <div>
        <a
          href="https://m.stock.naver.com/domestic/index/KOSPI/total"
          target="_blank"
          rel="noopener noreferrer"
        >
          출처: 네이버 증권
        </a>
        · 실시간 데이터가 아닌 자동 갱신 데이터입니다.
      </div>
    </div>
  </main>

  <script>
    const numberFormat = new Intl.NumberFormat("ko-KR", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const compactFormat = new Intl.NumberFormat("ko-KR", {
      notation: "compact",
      maximumFractionDigits: 1
    });

    let allRows = [];
    let candleSeries;
    let volumeSeries;
    let chart;
    let currentRange = "3M";

    function parseDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function monthsAgo(date, months) {
      const result = new Date(date);
      result.setMonth(result.getMonth() - months);
      return result;
    }

    function filterRows(range) {
      if (!allRows.length || range === "MAX") {
        return allRows;
      }

      const lastDate = parseDate(allRows[allRows.length - 1].time);
      let startDate;

      if (range === "1M") {
        startDate = monthsAgo(lastDate, 1);
      } else if (range === "3M") {
        startDate = monthsAgo(lastDate, 3);
      } else if (range === "6M") {
        startDate = monthsAgo(lastDate, 6);
      } else if (range === "1Y") {
        startDate = monthsAgo(lastDate, 12);
      } else if (range === "YTD") {
        startDate = new Date(lastDate.getFullYear(), 0, 1);
      } else {
        return allRows;
      }

      return allRows.filter(row => parseDate(row.time) >= startDate);
    }

    function updateOhlc(row) {
      if (!row) {
        document.getElementById("ohlc").textContent =
          "캔들 위에 마우스를 올리면 시가·고가·저가·종가가 표시됩니다.";
        return;
      }

      document.getElementById("ohlc").textContent =
        `${row.time}  시 ${numberFormat.format(row.open)}  ` +
        `고 ${numberFormat.format(row.high)}  ` +
        `저 ${numberFormat.format(row.low)}  ` +
        `종 ${numberFormat.format(row.close)}  ` +
        `거래량 ${compactFormat.format(row.volume || 0)}`;
    }

    function drawRange(range) {
      currentRange = range;

      document.querySelectorAll(".range-button").forEach(button => {
        button.classList.toggle(
          "active",
          button.dataset.range === range
        );
      });

      const rows = filterRows(range);

      candleSeries.setData(
        rows.map(row => ({
          time: row.time,
          open: row.open,
          high: row.high,
          low: row.low,
          close: row.close
        }))
      );

      volumeSeries.setData(
        rows.map(row => ({
          time: row.time,
          value: row.volume || 0,
          color:
            row.close >= row.open
              ? "rgba(239, 51, 64, 0.36)"
              : "rgba(47, 110, 219, 0.36)"
        }))
      );

      chart.timeScale().fitContent();
      updateOhlc(rows[rows.length - 1]);
    }

    function createChart() {
      const container = document.getElementById("chart");

      chart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: container.clientHeight,

        layout: {
          background: {
            type: "solid",
            color: "#ffffff"
          },
          textColor: "#667085",
          fontFamily:
            'Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          fontSize: 10
        },

        grid: {
          vertLines: {
            color: "#f0f2f6"
          },
          horzLines: {
            color: "#f0f2f6"
          }
        },

        crosshair: {
          mode: LightweightCharts.CrosshairMode.Normal
        },

        rightPriceScale: {
          borderColor: "#e6e9ef",
          scaleMargins: {
            top: 0.08,
            bottom: 0.25
          }
        },

        timeScale: {
          borderColor: "#e6e9ef",
          timeVisible: false,
          secondsVisible: false,
          rightOffset: 2,
          barSpacing: 9,
          minBarSpacing: 3,
          fixLeftEdge: true,
          lockVisibleTimeRangeOnResize: true
        },

        localization: {
          locale: "ko-KR",
          priceFormatter: price => numberFormat.format(price)
        },

        handleScroll: {
          mouseWheel: true,
          pressedMouseMove: true,
          horzTouchDrag: true,
          vertTouchDrag: false
        },

        handleScale: {
          axisPressedMouseMove: true,
          mouseWheel: true,
          pinch: true
        }
      });

      candleSeries = chart.addCandlestickSeries({
        upColor: "#ef3340",
        downColor: "#2f6edb",
        borderUpColor: "#ef3340",
        borderDownColor: "#2f6edb",
        wickUpColor: "#ef3340",
        wickDownColor: "#2f6edb",
        priceLineVisible: true,
        lastValueVisible: true
      });

      volumeSeries = chart.addHistogramSeries({
        priceFormat: {
          type: "volume"
        },
        priceScaleId: "",
        lastValueVisible: false,
        priceLineVisible: false
      });

      volumeSeries.priceScale().applyOptions({
        scaleMargins: {
          top: 0.82,
          bottom: 0
        }
      });

      chart.subscribeCrosshairMove(param => {
        if (!param.time) {
          updateOhlc(filterRows(currentRange).at(-1));
          return;
        }

        const time =
          typeof param.time === "string"
            ? param.time
            : `${param.time.year}-${String(param.time.month).padStart(2, "0")}-${String(param.time.day).padStart(2, "0")}`;

        const row = allRows.find(item => item.time === time);
        updateOhlc(row);
      });

      const resizeObserver = new ResizeObserver(entries => {
        for (const entry of entries) {
          chart.applyOptions({
            width: entry.contentRect.width,
            height: entry.contentRect.height
          });
        }
      });

      resizeObserver.observe(container);
    }

    function showSummary(data) {
      const latest = data.latest;
      const changeElement = document.getElementById("change");

      document.getElementById("price").textContent =
        numberFormat.format(latest.close);

      const isUp = latest.change > 0;
      const isDown = latest.change < 0;
      const arrow = isUp ? "▲" : isDown ? "▼" : "―";
      const sign = isUp ? "+" : "";

      changeElement.className =
        `change ${isUp ? "up" : isDown ? "down" : "flat"}`;

      changeElement.textContent =
        `${arrow} ${sign}${numberFormat.format(latest.change)} ` +
        `(${sign}${latest.change_rate.toFixed(2)}%)`;

      document.getElementById("marketDate").textContent =
        data.market_date;

      document.getElementById("updatedAt").textContent =
        data.updated_at;
    }

    function showError(message) {
      document.getElementById("chart").style.display = "none";
      document.querySelector(".toolbar").style.display = "none";

      const error = document.getElementById("error");
      error.style.display = "block";
      error.innerHTML =
        `<strong>차트 데이터를 표시하지 못했습니다.</strong><br>` +
        `${message}<br><br>` +
        `GitHub 저장소의 Actions 메뉴에서 코스피 데이터 갱신 작업을 실행해 주세요.`;

      document.getElementById("change").textContent =
        "갱신이 필요합니다.";
    }

    async function loadData() {
      try {
        const response = await fetch(`data.json?t=${Date.now()}`);

        if (!response.ok) {
          throw new Error("data.json 파일을 불러오지 못했습니다.");
        }

        const data = await response.json();

        if (!Array.isArray(data.rows) || data.rows.length < 2) {
          throw new Error(
            "아직 실제 코스피 데이터가 없습니다. Actions를 먼저 실행해 주세요."
          );
        }

        allRows = data.rows;
        showSummary(data);
        createChart();
        drawRange("3M");

        document.querySelectorAll(".range-button").forEach(button => {
          button.addEventListener("click", () => {
            drawRange(button.dataset.range);
          });
        });
      } catch (error) {
        showError(error.message);
      }
    }

    loadData();
  </script>
</body>
</html>
