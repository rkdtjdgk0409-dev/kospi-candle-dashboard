name: 코스피 캔들 데이터 자동 갱신

on:
  workflow_dispatch:

  schedule:
    # 한국시간 기준 평일 오후 4시 35분
    - cron: "35 16 * * 1-5"
      timezone: "Asia/Seoul"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: GitHub 컴퓨터에 Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 필요한 도구 설치
        run: pip install -r requirements.txt

      - name: 네이버 코스피 데이터 가져오기
        run: python update.py

      - name: 새 데이터를 저장소에 반영
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "코스피 캔들 데이터 자동 갱신"
          git push
